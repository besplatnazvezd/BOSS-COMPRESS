<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>BOSS COMPRESS — Ultra Compression</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@400;700;900&display=swap" rel="stylesheet">

    <style>
        body { background-color: #000000; color: #ffffff; font-family: 'Outfit', sans-serif; }
        .boss-glass { background: #0a0a0a; border: 1px solid #1a1a1a; }
        .accent-blue { color: #007bff; }
        input[type="range"] { -webkit-appearance: none; height: 8px; background: #222; border-radius: 4px; }
        input[type="range"]::-webkit-slider-thumb { -webkit-appearance: none; width: 24px; height: 24px; background: #007bff; border-radius: 50%; cursor: pointer; }
    </style>
</head>
<body class="flex flex-col items-center min-h-screen py-10 px-4">

    <div class="w-full max-w-lg">
        <div class="text-center mb-10">
            <h1 class="text-4xl font-black italic uppercase tracking-tighter">BOSS <span class="accent-blue">COMPRESS</span></h1>
            <p class="text-gray-500 text-sm mt-2">Экстремальное сжатие фото без потери качества</p>
        </div>

        <!-- Зона загрузки -->
        <div id="drop-zone" class="boss-glass rounded-3xl p-10 text-center border-2 border-dashed border-gray-800 cursor-pointer hover:border-blue-600 transition">
            <input type="file" id="file-input" class="hidden" accept="image/*">
            <i class="fa-solid fa-compress text-4xl text-blue-600 mb-4"></i>
            <p class="font-bold">Нажми сюда или перетащи фото</p>
            <p class="text-[10px] text-gray-600 uppercase mt-2">Максимальное сжатие в WebP</p>
        </div>

        <!-- Панель управления (появится после загрузки) -->
        <div id="controls" class="hidden mt-8 space-y-6">
            <div class="boss-glass rounded-2xl p-6">
                <div class="flex justify-between mb-2">
                    <span class="text-xs uppercase text-gray-400">Сила сжатия:</span>
                    <span id="quality-val" class="text-blue-500 font-bold">60%</span>
                </div>
                <input type="range" id="quality" min="10" max="90" value="60" class="w-full">
            </div>

            <div class="grid grid-cols-2 gap-4">
                <div class="boss-glass rounded-2xl p-4 text-center">
                    <p class="text-[9px] uppercase text-gray-600">Оригинал</p>
                    <p id="size-before" class="font-bold">0 MB</p>
                </div>
                <div class="boss-glass rounded-2xl p-4 text-center border-blue-900 border">
                    <p class="text-[9px] uppercase text-blue-500">Сжато</p>
                    <p id="size-after" class="font-bold text-blue-400">0 MB</p>
                </div>
            </div>

            <button id="download-btn" class="w-full bg-blue-600 hover:bg-blue-700 py-4 rounded-xl font-bold uppercase transition">
                Скачать сжатое фото
            </button>
        </div>
    </div>

    <canvas id="canvas" class="hidden"></canvas>

    <script>
        const fileInput = document.getElementById('file-input'),
              dropZone = document.getElementById('drop-zone'),
              controls = document.getElementById('controls'),
              quality = document.getElementById('quality'),
              qualityVal = document.getElementById('quality-val'),
              downloadBtn = document.getElementById('download-btn'),
              canvas = document.getElementById('canvas'),
              sizeBefore = document.getElementById('size-before'),
              sizeAfter = document.getElementById('size-after');

        let uploadedFile = null;

        dropZone.onclick = () => fileInput.click();
        fileInput.onchange = (e) => handleFile(e.target.files[0]);

        function handleFile(file) {
            uploadedFile = file;
            sizeBefore.innerText = (file.size / 1024 / 1024).toFixed(2) + ' MB';
            compress();
            controls.classList.remove('hidden');
        }

        function compress() {
            const reader = new FileReader();
            reader.readAsDataURL(uploadedFile);
            reader.onload = (e) => {
                const img = new Image();
                img.src = e.target.result;
                img.onload = () => {
                    const ctx = canvas.getContext('2d');
                    canvas.width = img.width;
                    canvas.height = img.height;
                    ctx.drawImage(img, 0, 0);
                    
                    const q = quality.value / 100;
                    qualityVal.innerText = quality.value + '%';
                    
                    canvas.toBlob((blob) => {
                        sizeAfter.innerText = (blob.size / 1024 / 1024).toFixed(2) + ' MB';
                        downloadBtn.onclick = () => {
                            const link = document.createElement('a');
                            link.href = URL.createObjectURL(blob);
                            link.download = 'BOSS_COMPRESS.webp';
                            link.click();
                        };
                    }, 'image/webp', q);
                };
            };
        }

        quality.oninput = compress;
    </script>
</body>
</html>
